<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ebars.</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0812;
            --surface: #141121;
            --surface-bright: #1c182e;
            --border: #2d2445;
            --accent: #bc91ff; 
            --accent-glow: rgba(188, 145, 255, 0.4);
            --text: #e2daff;
            --text-dim: #8b7fa3;
            --font-main: 'JetBrains Mono', monospace;
            --grad-start: #1a1033;
            --btn-grad: linear-gradient(135deg, #a370ff, #8a4fff);
        }

        [data-theme="red"] {
            --accent: #ff4d4d;
            --accent-glow: rgba(255, 77, 77, 0.4);
            --border: #451a1a;
            --surface: #1a0d0d;
            --surface-bright: #2b1414;
            --grad-start: #331010;
            --btn-grad: linear-gradient(135deg, #ff4d4d, #b30000);
            --text: #ffdada;
            --text-dim: #a37f7f;
        }

        [data-theme="gold"] {
            --accent: #ffcc00;
            --accent-glow: rgba(255, 204, 0, 0.4);
            --border: #453a1a;
            --surface: #1a170d;
            --surface-bright: #2b2614;
            --grad-start: #332b10;
            --btn-grad: linear-gradient(135deg, #ffcc00, #b38f00);
            --text: #fff6da;
            --text-dim: #a3997f;
        }

        [data-theme="green"] {
            --accent: #00ffaa;
            --accent-glow: rgba(0, 255, 170, 0.4);
            --border: #1a4535;
            --surface: #0d1a15;
            --surface-bright: #142b21;
            --grad-start: #103325;
            --btn-grad: linear-gradient(135deg, #00ffaa, #00b377);
            --text: #dafff2;
            --text-dim: #7fa395;
        }

        * { box-sizing: border-box; font-family: var(--font-main); transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; border: 2px solid var(--bg); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 50% -20%, var(--grad-start) 0%, var(--bg) 80%);
            background-attachment: fixed;
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 0 20px; 
        }

        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            background-image: radial-gradient(circle at center, var(--grad-start) 0%, var(--bg) 70%);
            z-index: 10001;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 40px; border-radius: 24px; width: 100%; max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.6s ease;
        }
        .login-title { font-size: 20px; color: var(--accent); margin-bottom: 30px; text-align: center; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 0 10px var(--accent-glow); }
        .input-wrapper { position: relative; margin-bottom: 20px; }
        .input-wrapper svg { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; stroke: var(--text-dim); fill: none; stroke-width: 1.5; }
        .login-input {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            padding: 15px 15px 15px 45px; border-radius: 12px; color: var(--text);
            outline: none; font-size: 14px;
        }
        .login-input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        
        .pass-toggle { 
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%); 
            cursor: pointer; color: var(--text-dim); 
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px;
        }
        .pass-toggle:hover { color: var(--accent); background: var(--accent-glow); }
        .pass-toggle svg { position: static; transform: none; width: 18px; height: 18px; stroke: currentColor; }

        #device-selector {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            background-image: radial-gradient(circle at center, var(--grad-start) 0%, var(--bg) 70%);
            z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #device-selector.hidden { opacity: 0; visibility: hidden; }

        .sel-card { text-align: center; animation: slideUp 0.6s ease; }
        .sel-title { font-size: 24px; margin-bottom: 30px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 15px var(--accent-glow); }
        .sel-grid { display: flex; gap: 20px; }
        
        .sel-option {
            background: var(--surface); border: 1px solid var(--border);
            padding: 40px; border-radius: 20px; cursor: pointer;
            width: 160px; display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .sel-option:hover { border-color: var(--accent); box-shadow: 0 0 30px var(--accent-glow); transform: translateY(-5px); }
        .sel-option svg { width: 40px; height: 40px; stroke: var(--accent); fill: none; stroke-width: 1.5; filter: drop-shadow(0 0 5px var(--accent-glow)); }
        .sel-option span { font-size: 12px; font-weight: 600; letter-spacing: 1px; }

        #main-wrapper { display: none; width: 100%; max-width: 900px; flex-direction: column; align-items: center; opacity: 0; transition: opacity 0.5s ease; }

        header { 
            width: 100%; 
            padding: 50px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            margin-bottom: 40px; 
        }

        h1 { 
            font-size: 32px; 
            font-weight: 400; 
            letter-spacing: -1px; 
            margin: 0; 
            background: linear-gradient(to bottom, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        nav { display: flex; gap: 8px; background: var(--surface); padding: 4px; border-radius: 8px; border: 1px solid var(--border); align-items: center; }
        
        .nav-btn { 
            background: transparent; 
            border: none;
            color: var(--text-dim); 
            padding: 10px 20px; 
            font-size: 11px; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .nav-btn.active { 
            background: var(--border); 
            color: var(--accent); 
        }

        .settings-btn-icon { padding: 10px !important; }
        .settings-btn-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; transition: transform 0.4s ease; }
        .settings-btn-icon:hover svg { transform: rotate(90deg); }

        .main-content { width: 100%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease forwards; }

        .editor-space { 
            position: relative; 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 12px;
            margin-bottom: 24px; 
            overflow: hidden;
        }

        #backdrop, textarea { 
            width: 100%; 
            height: 300px; 
            padding: 24px; 
            font-size: 15px; 
            line-height: 1.7; 
            border: none;
            margin: 0;
            white-space: pre-wrap; 
            word-wrap: break-word; 
            overflow-wrap: anywhere;
        }

        #backdrop { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            color: transparent; 
            pointer-events: none; 
            z-index: 1; 
            overflow-y: auto;
        }

        textarea { 
            background: transparent; 
            color: var(--text); 
            resize: none; 
            outline: none; 
            z-index: 2; 
            position: relative; 
            display: block;
        }

        mark { 
            color: transparent; 
            background: var(--accent-glow); 
            border-bottom: 2px solid var(--accent); 
        }

        .empty-msg {
            text-align: center; padding: 40px; color: var(--text-dim); font-size: 14px;
            letter-spacing: 1px; text-transform: uppercase; border: 1px dashed var(--border); border-radius: 12px;
        }

        .compare-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .compare-area { height: 200px !important; }
        
        .similarity-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
            padding: 40px; text-align: center; margin-top: 20px;
            border-top: 4px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideUp 0.6s forwards;
        }
        
        .sim-val { font-size: 64px; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); font-weight: 700; }

        .action-btn { 
            width: 100%; 
            padding: 18px; 
            background: var(--btn-grad); 
            color: #fff; 
            border: none; 
            border-radius: 12px;
            font-size: 12px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            cursor: pointer; 
            margin-bottom: 30px; 
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .action-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

        .result-row { 
            display: flex; align-items: center; padding: 16px 20px; 
            background: var(--surface); border-radius: 12px; margin-bottom: 10px;
            border: 1px solid var(--border); animation: slideUp 0.4s ease forwards;
        }

        .controls-group { display: flex; gap: 8px; margin-right: 15px; }
        
        .indicator, .eye-btn { 
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border-radius: 8px; border: 1px solid var(--border); 
            background: var(--surface-bright); 
        }

        .indicator:hover, .eye-btn:hover { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        .indicator svg, .eye-btn svg { width: 16px; height: 16px; fill: none; stroke: var(--text-dim); stroke-width: 2; }
        .active-indicator { background: var(--accent) !important; border-color: var(--accent) !important; }
        .active-indicator svg { stroke: var(--bg) !important; }

        /* НАСТРОЙКИ ТЕМЫ */
        .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .theme-box { 
            padding: 20px; border-radius: 12px; border: 1px solid var(--border); 
            background: var(--surface-bright); cursor: pointer; text-align: center;
        }
        .theme-box:hover { border-color: var(--accent); }
        .theme-box.active { border-color: var(--accent); background: var(--border); }
        .color-preview { width: 100%; height: 10px; border-radius: 5px; margin-top: 10px; }

        /* АНОМАЛИИ СТИЛИ */
        .anomaly-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-top: 20px; }
        .anomaly-card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px; 
            padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
            animation: slideUp 0.4s ease forwards;
        }
        .anomaly-word { font-size: 14px; letter-spacing: 0.5px; color: var(--text); overflow: hidden; text-overflow: ellipsis; }
        .anomaly-word span { color: #fff; background: var(--accent); padding: 0 2px; border-radius: 3px; box-shadow: 0 0 8px var(--accent-glow); }
        .anomaly-meta { font-size: 10px; color: var(--accent); font-weight: 700; text-transform: uppercase; white-space: nowrap; margin-left: 15px; }

        /* АДАПТАЦИЯ */
        body.is-mobile header { flex-direction: column; gap: 20px; padding: 30px 0; }
        body.is-mobile nav { width: 100%; flex-wrap: wrap; justify-content: center; }
        body.is-mobile .nav-btn { padding: 12px 10px; font-size: 9px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        #modalOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(10, 8, 18, 0.95); backdrop-filter: blur(8px); 
            display: none; justify-content: center; align-items: center; z-index: 10000; 
        }

        .modal-card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
            width: 90%; max-width: 650px; padding: 30px; max-height: 85vh; overflow-y: auto; 
        }

        .context-item { 
            background: var(--bg); padding: 20px; border-radius: 10px;
            border-left: 4px solid var(--accent); margin-bottom: 15px; font-size: 14px; 
            color: var(--text-dim); white-space: pre-wrap;
        }

        .context-item b { color: var(--accent); background: var(--accent-glow); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <div class="login-title">авторизация</div>
        <div class="input-wrapper">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <input type="text" id="l_user" class="login-input" placeholder="логин" autocomplete="off">
        </div>
        <div class="input-wrapper">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" id="l_pass" class="login-input" placeholder="пароль">
            <div class="pass-toggle" id="eye-icon" onclick="togglePass()"></div>
        </div>
        <button class="action-btn" style="margin-bottom:0" onclick="checkAuth()">войти</button>
    </div>
</div>

<div id="device-selector">
    <div class="sel-card">
        <div class="sel-title">выбери устройство</div>
        <div class="sel-grid">
            <div class="sel-option" onclick="startLogin('pc')">
                <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                <span>ПК</span>
            </div>
            <div class="sel-option" onclick="startLogin('mobile')">
                <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                <span>ТЕЛЕФОН</span>
            </div>
        </div>
    </div>
</div>

<div id="main-wrapper">
    <header>
        <h1>ebars.</h1>
        <nav>
            <button class="nav-btn active" onclick="switchTab('repeats')">повторы</button>
            <button class="nav-btn" onclick="switchTab('compare')">сравнение</button>
            <button class="nav-btn" onclick="switchTab('symbols')">символы</button>
            <button class="nav-btn settings-btn-icon" onclick="switchTab('settings')" title="Настройки">
                <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
            </button>
        </nav>
    </header>

    <div class="main-content">
        <div id="repeatsTab" class="tab-content active">
            <div class="editor-space">
                <div id="backdrop"></div>
                <textarea id="txtIn" placeholder="введите текст..." oninput="sync()"></textarea>
            </div>
            <button class="action-btn" onclick="analyzeRepeats()">найти повторы</button>
            <div id="repeatResults"></div>
        </div>

        <div id="compareTab" class="tab-content">
            <div class="compare-container">
                <div class="editor-space"><textarea id="compA" class="compare-area" placeholder="текст (оригинал)"></textarea></div>
                <div class="editor-space"><textarea id="compB" class="compare-area" placeholder="текст (подозрительный)"></textarea></div>
            </div>
            <button class="action-btn" onclick="advancedCompare()">сравнить текста</button>
            <div id="compareResult"></div>
        </div>

        <div id="symbolsTab" class="tab-content">
            <div class="editor-space">
                <textarea id="txtSym" placeholder="введите текст..."></textarea>
            </div>
            <button class="action-btn" onclick="analyzeAnomalies()">найти скрытые символы</button>
            <div id="anomalyResults" class="anomaly-grid"></div>
        </div>

        <div id="settingsTab" class="tab-content">
            <div class="sel-title" style="font-size: 16px; text-align: left;">темы</div>
            <div class="theme-grid">
                <div class="theme-box" onclick="setTheme('default', this)">фиолетовая <div class="color-preview" style="background: #bc91ff;"></div></div>
                <div class="theme-box" onclick="setTheme('red', this)">красная <div class="color-preview" style="background: #ff4d4d;"></div></div>
                <div class="theme-box" onclick="setTheme('gold', this)">золотая <div class="color-preview" style="background: #ffcc00;"></div></div>
                <div class="theme-box" onclick="setTheme('green', this)">изумрудная <div class="color-preview" style="background: #00ffaa;"></div></div>
            </div>
        </div>
    </div>
</div>

<div id="modalOverlay" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div id="modalBody"></div>
    </div>
</div>

<script>
    let activePhrase = "";
    const icons = {
        arrow: '<svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>',
        close: '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>',
        eye: '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
        eyeOff: '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
    };

    const _u = "ebar"; 
    const _p = "543";  
    let selectedMode = 'pc';

    document.addEventListener('DOMContentLoaded', updateEyeIcon);

    function setTheme(name, el) {
        if(name === 'default') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', name);
        document.querySelectorAll('.theme-box').forEach(b => b.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    function startLogin(mode) {
        selectedMode = mode;
        document.getElementById('device-selector').classList.add('hidden');
        setTimeout(() => {
            document.getElementById('device-selector').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
        }, 500);
    }

    function togglePass() {
        const input = document.getElementById('l_pass');
        input.type = input.type === 'password' ? 'text' : 'password';
        updateEyeIcon();
    }

    function updateEyeIcon() {
        const input = document.getElementById('l_pass');
        const btn = document.getElementById('eye-icon');
        btn.innerHTML = input.type === 'password' ? icons.eyeOff : icons.eye;
    }

    function checkAuth() {
        const u = document.getElementById('l_user').value;
        const p = document.getElementById('l_pass').value;
        if (u === _u && p === _p) initApp(selectedMode);
        else alert('неверные данные');
    }

    function initApp(mode) {
        const loginScreen = document.getElementById('login-screen');
        const wrapper = document.getElementById('main-wrapper');
        if (mode === 'mobile') document.body.classList.add('is-mobile');
        loginScreen.style.opacity = '0';
        setTimeout(() => {
            loginScreen.style.display = 'none';
            wrapper.style.display = 'flex';
            setTimeout(() => wrapper.style.opacity = '1', 50);
        }, 500);
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.add('active');
        const btn = document.querySelector(`.nav-btn[onclick*="${tab}"]`);
        if(btn) btn.classList.add('active');
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'}[m]));
    }

    function sync() {
        const textarea = document.getElementById('txtIn');
        const bdrop = document.getElementById('backdrop');
        const text = textarea.value;
        requestAnimationFrame(() => {
            bdrop.scrollTop = textarea.scrollTop;
            bdrop.scrollLeft = textarea.scrollLeft;
            if (activePhrase) {
                const escapedWords = activePhrase.split(' ').map(word => word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
                const regexStr = escapedWords.join('[\\s.,\\/#!$%\\^&\\*;:{}=\\-_`~()]+');
                const regex = new RegExp(`(${regexStr})`, 'gi');
                bdrop.innerHTML = escapeHTML(text).replace(regex, '<mark>$1</mark>') + '\n';
            } else bdrop.innerHTML = escapeHTML(text) + '\n';
        });
    }

    function toggleHighlight(phrase, el) {
        if (activePhrase === phrase) {
            activePhrase = ""; el.classList.remove('active-indicator'); el.innerHTML = icons.arrow;
        } else {
            document.querySelectorAll('.indicator').forEach(i => { i.classList.remove('active-indicator'); i.innerHTML = icons.arrow; });
            activePhrase = phrase; el.classList.add('active-indicator'); el.innerHTML = icons.close;
        }
        sync();
    }

    function analyzeRepeats() {
        const input = document.getElementById('txtIn').value;
        const resDiv = document.getElementById('repeatResults');
        resDiv.innerHTML = ''; activePhrase = ""; sync();
        if (!input.trim()) { resDiv.innerHTML = '<div class="empty-msg">введите текст для анализа</div>'; return; }
        const words = input.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()\n\r]/g, " ").split(/\s+/).filter(w => w.length > 0);
        const counts = new Map();
        for (let len = 2; len <= 10; len++) {
            for (let i = 0; i <= words.length - len; i++) {
                const p = words.slice(i, i + len).join(' ');
                counts.set(p, (counts.get(p) || 0) + 1);
            }
        }
        let dupes = Array.from(counts.entries()).filter(d => d[1] > 1);
        if (dupes.length === 0) { resDiv.innerHTML = '<div class="empty-msg">повторов не найдено</div>'; return; }
        dupes.sort((a, b) => b[0].split(' ').length - a[0].split(' ').length);
        const filtered = [];
        for (let i = 0; i < dupes.length; i++) {
            let [phrase, count] = dupes[i];
            let isRedundant = false;
            for (let j = 0; j < dupes.length; j++) {
                if (i === j) continue;
                if (dupes[j][0].includes(phrase) && count === dupes[j][1]) { isRedundant = true; break; }
            }
            if (!isRedundant) filtered.push(dupes[i]);
        }
        filtered.sort((a, b) => b[1] - a[1] || b[0].length - a[0].length);
        filtered.forEach(([txt, n], index) => {
            const row = document.createElement('div');
            row.className = 'result-row';
            row.style.animationDelay = `${index * 0.03}s`;
            const safeTxt = txt.replace(/'/g, "\\'");
            row.innerHTML = `<div class="controls-group">
                <div class="indicator" onclick="toggleHighlight('${safeTxt}', this)">${icons.arrow}</div>
                <div class="eye-btn" onclick="showContext('${safeTxt}')">${icons.eye}</div>
            </div>
            <div style="flex-grow:1; font-size: 14px;">${txt}</div>
            <div style="color:var(--accent); font-weight:700;">${n} раз</div>`;
            resDiv.appendChild(row);
        });
    }

    function advancedCompare() {
        const s1 = document.getElementById('compA').value.trim().toLowerCase();
        const s2 = document.getElementById('compB').value.trim().toLowerCase();
        const resDiv = document.getElementById('compareResult');
        if (!s1 || !s2) { resDiv.innerHTML = '<div class="empty-msg">введите оба текста</div>'; return; }
        function getBigrams(str) {
            const bigrams = new Set();
            for (let i = 0; i < str.length - 1; i++) bigrams.add(str.substring(i, i + 2));
            return bigrams;
        }
        const b1 = getBigrams(s1), b2 = getBigrams(s2);
        let intersect = 0;
        for (let b of b1) if (b2.has(b)) intersect++;
        const score = Math.floor((2 * intersect) / (b1.size + b2.size) * 100) || 0;
        resDiv.innerHTML = `<div class="similarity-card">
            <div style="text-transform:uppercase; font-size:10px; letter-spacing:2px; opacity:0.6">Уникальность: ${100-score}%</div>
            <div class="sim-val">${score}%</div>
            <div style="color:var(--text-dim)">схожести</div>
        </div>`;
    }

    function analyzeAnomalies() {
        const input = document.getElementById('txtSym').value;
        const resDiv = document.getElementById('anomalyResults');
        resDiv.innerHTML = '';
        if (!input.trim()) { resDiv.innerHTML = '<div class="empty-msg" style="grid-column: 1/-1">введите текст</div>'; return; }
        
        const words = input.split(/[\s\n]+/);
        let found = false;
        
        words.forEach((word, index) => {
            if (!word) return;
            
            const hasRus = /[а-яё]/i.test(word);
            const hasLat = /[a-z]/i.test(word);
            const hasSpecial = /[^а-яёa-z0-9\s.,!?:;()\-]/i.test(word);

            if ((hasRus && hasLat) || hasSpecial) {
                found = true;
                const regex = hasRus ? /[^а-яё0-9.,!?:;()\-]/gi : /[^a-z0-9.,!?:;()\-]/gi;
                
                const count = (word.match(regex) || []).length;
                const highlighted = escapeHTML(word).replace(regex, (m) => `<span>${m}</span>`);
                
                const card = document.createElement('div');
                card.className = 'anomaly-card';
                card.style.animationDelay = `${index * 0.05}s`;
                card.innerHTML = `
                    <div class="anomaly-word">${highlighted}</div>
                    <div class="anomaly-meta">${count} замен</div>
                `;
                resDiv.appendChild(card);
            }
        });

        if (!found) resDiv.innerHTML = '<div class="empty-msg" style="grid-column: 1/-1">скрытых символов не найдено</div>';
    }

    function showContext(phrase) {
        const text = document.getElementById('txtIn').value;
        const body = document.getElementById('modalBody');
        body.innerHTML = `<div style="color:var(--accent); margin-bottom:20px; font-weight:700;">ПОВТОР: ${phrase}</div>`;
        const escapedWords = phrase.split(' ').map(word => word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
        const regexStr = escapedWords.join('[\\s.,\\/#!$%\\^&\\*;:{}=\\-_`~()]+');
        const regex = new RegExp(regexStr, 'gi');
        let m;
        while ((m = regex.exec(text)) !== null) {
            const start = Math.max(0, m.index - 40);
            const end = Math.min(text.length, m.index + m[0].length + 40);
            body.innerHTML += `<div class="context-item">...${escapeHTML(text.substring(start, m.index))}<b>${escapeHTML(m[0])}</b>${escapeHTML(text.substring(m.index + m[0].length, end))}...</div>`;
            if (body.children.length > 50) break;
        }
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    
    document.getElementById('txtIn').addEventListener('scroll', function() {
        const bdrop = document.getElementById('backdrop');
        bdrop.scrollTop = this.scrollTop; bdrop.scrollLeft = this.scrollLeft;
    });
</script>
