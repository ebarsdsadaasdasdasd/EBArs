<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ebars.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0812;
            --surface: #141121;
            --surface-bright: #1c182e;
            --border: #2d2445;
            --accent: #bc91ff; 
            --accent-glow: rgba(188, 145, 255, 0.4);
            --text: #e2daff;
            --text-dim: #8b7fa3;
        }

        * { box-sizing: border-box; }
        
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 50% -20%, #20153a 0%, var(--bg) 70%);
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 0 20px; 
        }

        header { 
            width: 100%; 
            max-width: 900px; 
            padding: 50px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            margin-bottom: 40px; 
        }

        /* ОБНОВЛЕННЫЙ СТИЛЬ ЗАГОЛОВКА */
        h1 { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px; 
            font-weight: 300; 
            letter-spacing: -1px; 
            margin: 0; 
            background: linear-gradient(to bottom, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        nav { display: flex; gap: 8px; background: var(--surface); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
        
        .nav-btn { 
            background: transparent; 
            border: none;
            color: var(--text-dim); 
            padding: 10px 20px; 
            font-size: 11px; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        
        .nav-btn.active { 
            background: var(--border); 
            color: var(--accent); 
        }

        .main-content { width: 100%; max-width: 900px; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .editor-space { 
            position: relative; 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 12px;
            margin-bottom: 24px; 
            overflow: hidden;
        }

        #backdrop { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            padding: 24px; 
            color: transparent; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 15px; 
            line-height: 1.7; 
            pointer-events: none; 
            z-index: 1; 
        }

        mark { 
            color: transparent; 
            background: rgba(188, 145, 255, 0.25); 
            border-bottom: 2px solid var(--accent); 
        }

        textarea { 
            width: 100%; 
            height: 300px; 
            background: transparent; 
            border: none; 
            color: var(--text); 
            padding: 24px; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 15px; 
            line-height: 1.7; 
            resize: none; 
            outline: none; 
            z-index: 2; 
            position: relative; 
        }

        .action-btn { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, #a370ff, #8a4fff); 
            color: #fff; 
            border: none; 
            border-radius: 12px;
            font-size: 12px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            cursor: pointer; 
            margin-bottom: 30px; 
        }

        .result-row { 
            display: flex; 
            align-items: center; 
            padding: 16px 20px; 
            background: var(--surface);
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            opacity: 0;
            animation: slideUp 0.4s ease forwards;
        }

        .empty-msg {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .controls-group { display: flex; gap: 8px; margin-right: 15px; }
        
        .indicator, .eye-btn { 
            width: 36px; height: 36px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; 
            border-radius: 8px;
            border: 1px solid var(--border); 
            background: var(--surface-bright); 
            transition: all 0.2s ease;
        }

        .indicator:hover, .eye-btn:hover { border-color: var(--accent); }

        .indicator svg, .eye-btn svg { width: 16px; height: 16px; fill: none; stroke: var(--text-dim); stroke-width: 2; }
        
        .active-indicator { background: var(--accent) !important; border-color: var(--accent) !important; }
        .active-indicator svg { stroke: var(--bg) !important; }

        #modalOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(10, 8, 18, 0.95); 
            backdrop-filter: blur(8px); 
            display: none; justify-content: center; align-items: center; 
            z-index: 1000; 
        }

        .modal-card { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 20px;
            width: 90%; max-width: 650px; 
            padding: 30px; 
            max-height: 85vh; 
            overflow-y: auto; 
            animation: slideUp 0.3s ease-out;
        }

        .context-item { 
            background: var(--bg); 
            padding: 20px; 
            border-radius: 10px;
            border-left: 4px solid var(--accent); 
            margin-bottom: 15px; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 14px; 
            line-height: 1.6;
            color: var(--text-dim);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .context-item b { 
            color: var(--accent); 
            background: rgba(188, 145, 255, 0.2); 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-weight: 600;
        }

        .anomaly-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        .anomaly-card { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 15px;
            opacity: 0;
            animation: slideUp 0.4s ease forwards;
        }

        .anomaly-word { font-family: 'JetBrains Mono', monospace; color: var(--text); display: block; margin-bottom: 5px; }
        .anomaly-word span { color: var(--accent); background: rgba(188, 145, 255, 0.2); padding: 0 2px; }
        .anomaly-meta { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <h1>ebars.</h1>
    <nav>
        <button class="nav-btn active" onclick="switchTab('repeats')">повторы</button>
        <button class="nav-btn" onclick="switchTab('symbols')">скрытые символы</button>
    </nav>
</header>

<div class="main-content">
    <div class="editor-space">
        <div id="backdrop"></div>
        <textarea id="txtIn" placeholder="вставьте текст сюда..." oninput="sync()"></textarea>
    </div>

    <div id="repeatsTab" class="tab-content active">
        <button class="action-btn" onclick="analyzeRepeats()">найти повторы</button>
        <div id="repeatResults"></div>
    </div>

    <div id="symbolsTab" class="tab-content">
        <button class="action-btn" onclick="analyzeAnomalies()">найти скрытые символы</button>
        <div id="anomalyResults" class="anomaly-grid"></div>
    </div>
</div>

<div id="modalOverlay" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div id="modalBody"></div>
    </div>
</div>

<script>
    let activePhrase = "";
    const icons = {
        arrow: '<line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline>',
        close: '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>',
        eye: '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>'
    };

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(tab === 'repeats') {
            document.getElementById('repeatsTab').classList.add('active');
            document.querySelector('[onclick="switchTab(\'repeats\')"]').classList.add('active');
        } else {
            document.getElementById('symbolsTab').classList.add('active');
            document.querySelector('[onclick="switchTab(\'symbols\')"]').classList.add('active');
        }
    }

    function sync() {
        const text = document.getElementById('txtIn').value;
        const bdrop = document.getElementById('backdrop');
        if (activePhrase) {
            const escaped = activePhrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escaped})`, 'gi');
            bdrop.innerHTML = text.replace(regex, '<mark>$1</mark>') + '\n';
        } else { bdrop.innerHTML = text + '\n'; }
    }

    function toggleHighlight(phrase, el) {
        if (activePhrase === phrase) {
            activePhrase = ""; 
            el.classList.remove('active-indicator'); 
            el.querySelector('svg').innerHTML = icons.arrow;
        } else {
            document.querySelectorAll('.indicator').forEach(i => { 
                i.classList.remove('active-indicator'); 
                i.querySelector('svg').innerHTML = icons.arrow; 
            });
            activePhrase = phrase; 
            el.classList.add('active-indicator'); 
            el.querySelector('svg').innerHTML = icons.close;
        }
        sync();
    }

    function analyzeRepeats() {
        const input = document.getElementById('txtIn').value;
        const resDiv = document.getElementById('repeatResults');
        resDiv.innerHTML = ''; activePhrase = ""; sync();
        
        if (!input.trim()) {
            resDiv.innerHTML = '<div class="empty-msg">Текст не введен</div>';
            return;
        }

        // 1. Подготовка слов (нижний регистр, без пунктуации)
        const words = input.toLowerCase()
            .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()\n\r]/g, " ")
            .replace(/\s+/g, ' ')
            .trim()
            .split(' ');
        
        const counts = new Map();

        // 2. Собираем все фразы от 2 до 10 слов
        for (let len = 2; len <= 10; len++) {
            for (let i = 0; i <= words.length - len; i++) {
                const p = words.slice(i, i + len).join(' ');
                counts.set(p, (counts.get(p) || 0) + 1);
            }
        }

        // 3. Оставляем только те, что повторяются (минимум 2 раза)
        let dupes = Array.from(counts.entries()).filter(d => d[1] > 1);
        
        if (dupes.length === 0) {
            resDiv.innerHTML = '<div class="empty-msg">Повторов не найдено</div>';
            return;
        }

        // 4. Сортируем от самых ДЛИННЫХ к коротким
        dupes.sort((a, b) => b[0].split(' ').length - a[0].split(' ').length || b[0].length - a[0].length);

        const filtered = [];
        for (let i = 0; i < dupes.length; i++) {
            let [phrase, count] = dupes[i];
            let isRedundant = false;

            for (let j = 0; j < dupes.length; j++) {
                if (i === j) continue;
                let [otherPhrase, otherCount] = dupes[j];

                // КРИТИЧЕСКОЕ ПРАВИЛО:
                // Если наша фраза (i) содержится внутри другой фразы (j) 
                // И при этом они встречаются одинаковое количество раз,
                // значит наша фраза — это просто "огрызок" более длинной. Скрываем её.
                if (otherPhrase.includes(phrase) && count === otherCount) {
                    isRedundant = true;
                    break;
                }
            }

            if (!isRedundant) {
                filtered.push(dupes[i]);
            }
        }

        // 5. Итоговая сортировка: сначала самые частые, при равенстве - самые длинные
        filtered.sort((a, b) => b[1] - a[1] || b[0].length - a[0].length);

        // 6. Вывод
        filtered.forEach(([txt, n], index) => {
            const row = document.createElement('div');
            row.className = 'result-row';
            row.style.animationDelay = `${index * 0.05}s`;
            row.innerHTML = `
                <div class="controls-group">
                    <div class="indicator" onclick="toggleHighlight('${txt.replace(/'/g, "\\'")}', this)">
                        <svg viewBox="0 0 24 24" stroke="currentColor">${icons.arrow}</svg>
                    </div>
                    <div class="eye-btn" onclick="showContext('${txt.replace(/'/g, "\\'")}')">
                        <svg viewBox="0 0 24 24" stroke="currentColor">${icons.eye}</svg>
                    </div>
                </div>
                <div style="flex-grow:1; font-size: 14px; color: var(--text);">${txt}</div>
                <div style="color:var(--accent); font-weight:700; background: rgba(188, 145, 255, 0.1); padding: 4px 10px; border-radius: 6px; white-space: nowrap;">${n} раз</div>
            `;
            resDiv.appendChild(row);
        });
    }

    function showContext(phrase) {
        const text = document.getElementById('txtIn').value;
        const body = document.getElementById('modalBody');
        body.innerHTML = `<div style="color:var(--accent); font-size:12px; margin-bottom:20px; text-transform:uppercase; font-weight:700; letter-spacing:1.5px;">повтор: ${phrase}</div>`;
        
        const escaped = phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(escaped, 'gi');
        let match;

        while ((match = regex.exec(text)) !== null) {
            const before = text.substring(0, match.index).trim().split(/\s+/).slice(-3).join(' ');
            const after = text.substring(match.index + phrase.length).trim().split(/\s+/).slice(0, 3).join(' ');

            const item = document.createElement('div');
            item.className = 'context-item';
            item.innerHTML = `${before} <b>${match[0]}</b> ${after}`;
            body.appendChild(item);
        }
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    function analyzeAnomalies() {
        const input = document.getElementById('txtIn').value;
        const resDiv = document.getElementById('anomalyResults');
        resDiv.innerHTML = '';
        
        if (!input.trim()) {
            resDiv.innerHTML = '<div class="empty-msg" style="grid-column: 1/-1">Не найдено</div>';
            return;
        }

        const words = input.split(/\s+/);
        let foundCount = 0;

        words.forEach(word => {
            const nonRussianRegex = /[^а-яё0-9\s.,!?:;()\-]/gi;
            if (nonRussianRegex.test(word)) {
                const count = (word.match(nonRussianRegex) || []).length;
                const highlighted = word.replace(nonRussianRegex, (m) => `<span>${m}</span>`);
                const card = document.createElement('div');
                card.className = 'anomaly-card';
                card.style.animationDelay = `${foundCount * 0.05}s`;
                card.innerHTML = `<span class="anomaly-word">${highlighted}</span><span class="anomaly-meta">скрытых символов: ${count}</span>`;
                resDiv.appendChild(card);
                foundCount++;
            }
        });

        if (foundCount === 0) {
            resDiv.innerHTML = '<div class="empty-msg" style="grid-column: 1/-1">Не найдено</div>';
        }
    }
</script>

</body>
</html>
