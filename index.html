<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINS5 MOD</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Creepster&display=swap');

        :root {
            --bg-dark: #141112; 
            --panel-bg: #1e1a1b; 
            --accent-red: #b81d1d; 
            --accent-hover: #ff1a1a;
            --input-bg: #252122;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-dark); 
            color: #ffffff; 
            margin: 0; 
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .wrapper { 
            width: 100%;
            max-width: 650px; 
            background: var(--panel-bg); 
            padding: 25px;
            border-radius: 2px;
            border: 1px solid var(--accent-red);
            box-shadow: 0 0 25px rgba(184, 29, 29, 0.3);
        }
        
        header { 
            text-align: center;
            margin-bottom: 30px;
        }
        

        .logo-main {
            font-family: 'Creepster', system-ui; 
            font-size: 72px;
            color: var(--accent-red);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 4px 4px 0px #000;
            margin: 0;
            line-height: 1;
        }

        textarea, .search-input { 
            width: 100%; 
            background: var(--input-bg);
            border: 1px solid var(--accent-red);
            color: #fff;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s;
        }
        
        textarea { 
            height: 180px; 
            resize: none; 
            margin-bottom: 15px;
        }

        textarea:focus, .search-input:focus {
            box-shadow: 0 0 8px rgba(184, 29, 29, 0.5);
            background: #2a2425;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-input { flex-grow: 1; }

        .btn-action {
            background: var(--input-bg);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            width: 48px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-action:hover {
            background: var(--accent-red);
            color: white;
            box-shadow: 0 0 10px var(--accent-red);
        }

        .results-area { 
            background: #141112; 
            border: 1px solid var(--accent-red);
            padding: 20px;
            min-height: 120px;
            font-size: 14px;
            color: #bbb;
            line-height: 1.6;
        }

        .highlight { 
            background: var(--accent-red); 
            color: #fff; 
            padding: 0 4px;
            font-weight: bold;
        }

        .svg-icon { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.5; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <div class="logo-main">MINS5 MOD</div>
    </header>

    <textarea id="textInput" placeholder=""></textarea>

    <div class="controls">
        <input type="text" id="keyword" class="search-input" placeholder="">
        
        <button class="btn-action" onclick="searchText()" title="ПОИСК">
            <svg class="svg-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        
        <button class="btn-action" onclick="clearAll()" title="ОЧИСТИТЬ">
            <svg class="svg-icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
    </div>

    <div id="results" class="results-area">
    </div>
</div>

<script>
    function searchText() {
        const text = document.getElementById('textInput').value;
        const word = document.getElementById('keyword').value;
        const resultsDiv = document.getElementById('results');

        if (!text || !word) {
            resultsDiv.innerHTML = "<span style='color: #ff1a1a'>[!] ТРЕБУЕТСЯ ВВОД ДАННЫХ</span>";
            return;
        }

        const safeWord = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${safeWord})`, 'gi');
        const highlightedText = text.replace(regex, '<span class="highlight">$1</span>');
        
        resultsDiv.innerHTML = highlightedText;
    }

    function clearAll() {
        document.getElementById('textInput').value = '';
        document.getElementById('keyword').value = '';
        document.getElementById('results').innerHTML = '';
    }
</script>

</body>
</html>
